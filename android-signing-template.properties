# Android Signing Configuration Template
# 
# To use this for releases:
# 1. Copy this file to packages/android/app/android-signing.properties
# 2. Fill in your actual signing information
# 3. Add android-signing.properties to .gitignore
# 4. Configure GitHub Secrets with the same values

# Keystore file path (relative to project root or absolute)
STORE_FILE=release.keystore

# Keystore password
STORE_PASSWORD=your_keystore_password_here

# Key alias
KEY_ALIAS=kutti

# Key password (can be same as store password)
KEY_PASSWORD=your_key_password_here

# Note: For CI/CD, these values should be stored in GitHub Secrets:
# - ANDROID_STORE_PASSWORD
# - ANDROID_KEY_PASSWORD
# - ANDROID_STORE_FILE (base64 encoded keystore)

# Example GitHub Actions usage:
# - name: Decode keystore
#   run: |
#     echo "${{ secrets.ANDROID_STORE_FILE }}" | base64 -d > app/release.keystore
# - name: Build release APK
#   run: |
#     ./gradlew assembleRelease \
#       -Pandroid.injected.signing.store.file=release.keystore \
#       -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_STORE_PASSWORD }} \
#       -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
#       -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

# For local development, you can use debug signing:
# The debug keystore is automatically created by Android Studio
# and is located at ~/.android/debug.keystore