      - id: "claude-3-haiku-20240307"
        name: "Claude 3 Haiku"
        context_length: 200000
        description: "Fast and efficient model"
      - id: "claude-3-sonnet-20240229"
        name: "Claude 3 Sonnet"
        context_length: 200000
        description: "Balanced model"
      - id: "claude-3-opus-20240229"
        name: "Claude 3 Opus"
        context_length: 200000
