# Kutti Provider Configuration
# This file configures the available providers and their settings

providers:
  # OpenAI
  openai:
    enabled: true
    display_name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    default_model: "gpt-4o"
    authentication_type: "api_key"
    api_key_env_var: "OPENAI_API_KEY"
    capabilities:
      chat: true
      embeddings: true
      vision: true
      tools: true
      streaming: true
      function_calling: true
    models:
      - id: "gpt-4o"
        name: "GPT-4o"
        context_length: 131072
        description: "Most advanced model with vision and audio"
      - id: "gpt-4o-mini"
        name: "GPT-4o Mini"
        context_length: 131072
        description: "Fast and efficient model"
      - id: "gpt-4-turbo"
        name: "GPT-4 Turbo"
        context_length: 131072
        description: "Optimized for speed"
      - id: "gpt-4"
        name: "GPT-4"
        context_length: 8192
        description: "Previous generation model"
      - id: "gpt-3.5-turbo"
        name: "GPT-3.5 Turbo"
        context_length: 16384
        description: "Cost-effective model"
      - id: "text-embedding-3-small"
        name: "Text Embedding 3 Small"
        context_length: 8192
        description: "Embedding model"

  # Anthropic
