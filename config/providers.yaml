# Default settings
defaults:
  provider: "openai"
  model: "gpt-4o"
  temperature: 0.7
  max_tokens: null
  timeout: 120
  retry_count: 3

# Authentication settings
auth:
  # Credential storage backend: keychain, secret-service, windows, file
  storage_backend: null  # Auto-detect based on platform
  
  # Encrypted file storage settings
  encrypted_storage:
    directory: "~/.kutti"
    encryption_key_file: ".encryption_key"
    credentials_file: "credentials.enc"

# Network settings
network:
  timeout: 120
  max_retries: 3
  retry_delay: 1.0
  proxy: null

# Logging settings
logging:
  level: "INFO"
  file: null
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Cache settings
cache:
  enabled: true
  models_ttl: 3600  # 1 hour
  directory: "~/.kutti/cache"

# Plugin settings
plugins:
  enabled: true
  directories:
    - "~/.kutti/plugins"
    - "./plugins"
  auto_load: true